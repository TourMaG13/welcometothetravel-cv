name: Link Drive CV

on:
  workflow_dispatch:

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-api-python-client google-auth firebase-admin
      - name: Link CVs
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python link_drive_cv.py
